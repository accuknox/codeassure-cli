services:
  nemotron-server:
    image: vllm/vllm-openai:v0.17.1-x86_64-cu130
    ports:
      - "5000:5000"
    volumes:
      - /home/ubuntu/.cache/huggingface:/root/.cache/huggingface
      - /home/shadeform/super_v3_reasoning_parser.py:/app/super_v3_reasoning_parser.py:ro
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - --model
      - nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
      - --async-scheduling
      - --served-model-name
      - nvidia/nemotron-3-super
      - --dtype
      - auto
      - --kv-cache-dtype
      - fp8
      - --tensor-parallel-size
      - "1"
      - --pipeline-parallel-size
      - "1"
      - --data-parallel-size
      - "1"
      - --swap-space
      - "0"
      - --trust-remote-code
      - --attention-backend
      - TRITON_ATTN
      - --gpu-memory-utilization
      - "0.9"
      - --enable-chunked-prefill
      - --max-num-seqs
      - "512"
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --reasoning-parser-plugin
      - /app/super_v3_reasoning_parser.py
      - --reasoning-parser
      - super_v3