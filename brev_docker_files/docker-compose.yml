services:
  qwen35-server:
    image: vllm/vllm-openai:v0.17.1-x86_64-cu130
    ports:
      - "5000:5000"
    volumes:
      - /home/shadeform/.cache/huggingface:/root/.cache/huggingface
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - Sehyo/Qwen3.5-122B-A10B-NVFP4
      - --served-model-name
      - qwen35-nvfp4
      - --swap-space
      - "16"
      - --max-num-seqs
      - "32"
      - --max-model-len
      - "65536"
      - --gpu-memory-utilization
      - "0.9"
      - --tensor-parallel-size
      - "1"
      - --language-model-only
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --reasoning-parser
      - qwen3
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --max-num-batched-tokens
      - "8192"
      - --trust-remote-code
      - --host
      - 0.0.0.0
      - --port
      - "5000"
